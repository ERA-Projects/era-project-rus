name: "DEBUG: Smart Cleanup Dry Run (Final Fix)"

on:
  workflow_dispatch:

jobs:
  simulate-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Analyze and Simulate Deletion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### Загрузка данных о релизах... ###"
          
          # Получаем список всех релизов
          RELEASES_JSON=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == false) | {id: .id, tag: .tag_name, created: .created_at}]')

          COUNT=$(echo "$RELEASES_JSON" | jq 'length')
          echo "Всего найдено опубликованных релизов: $COUNT"

          if [ "$COUNT" -le 10 ]; then
            echo "Релизов 10 или меньше. Все 10 последних остаются в сохранности."
            exit 0
          fi

          echo "--------------------------------------------------------"
          echo "АНАЛИЗ ИСТОРИИ (начиная с 11-го релиза):"

          # Выводим детальный лог анализа
          echo "$RELEASES_JSON" | jq -r '
            .[0:10] as $protected |
            .[10:] as $old_ones |
            range(0; $old_ones | length) as $i |
            $old_ones[$i] as $curr |
            (if $i == 0 then $protected[-1] else $old_ones[$i-1] end) as $next |
            
            ((($next.created | fromdateiso8601) - ($curr.created | fromdateiso8601)) / 86400) as $days |
            
            if $days < 7 then
              "[УДАЛЕНИЕ] Релиз \($curr.tag) (заменен через \($days | floor) дн.)"
            else
              "[СОХРАНИТЬ] Релиз \($curr.tag) (был актуален \($days | floor) дн.)"
            end
          '

          echo "--------------------------------------------------------"
          echo "### ИТОГОВЫЙ СПИСОК (что останется в репозитории): ###"

          echo "$RELEASES_JSON" | jq -r '
            .[0:10] as $protected |
            .[10:] as $old_ones |
            # Выводим 10 защищенных
            ($protected[].tag),
            # Выводим старые, которые прошли фильтр 7 дней
            (
              range(0; $old_ones | length) as $i |
              $old_ones[$i] as $curr |
              (if $i == 0 then $protected[-1] else $old_ones[$i-1] end) as $next |
              if ((($next.created | fromdateiso8601) - ($curr.created | fromdateiso8601)) / 86400) >= 7 
              then $curr.tag else empty end
            ),
            # Всегда сохраняем самый-самый старый релиз в истории (у него нет "следующего" для сравнения в цикле выше)
            ($old_ones[-1].tag)
          ' | uniq