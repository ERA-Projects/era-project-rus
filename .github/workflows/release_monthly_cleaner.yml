name: "DEBUG: Smart Cleanup Dry Run (Fixed)"

on:
  workflow_dispatch:

jobs:
  simulate-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Analyze and Simulate Deletion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### Загрузка данных о релизах... ###"
          
          # Получаем список всех релизов в компактном JSON
          RELEASES_JSON=$(gh api --paginate repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == false) | {id: .id, tag: .tag_name, created: .created_at}]')

          # Проверяем количество
          COUNT=$(echo "$RELEASES_JSON" | jq 'length')
          echo "Всего найдено опубликованных релизов: $COUNT"

          if [ "$COUNT" -le 10 ]; then
            echo "Релизов 10 или меньше. Все остаются в сохранности."
            exit 0
          fi

          echo "--------------------------------------------------------"
          echo "АНАЛИЗ ИСТОРИИ (проверка интервалов):"

          # Логика: 
          # 1. Оставляем первые 10 (они не попадают в выборку .[10:])
          # 2. Для остальных сравниваем дату с предыдущим (более новым) элементом
          echo "$RELEASES_JSON" | jq -r '
            .[10:] as $old_ones |
            .[0:10] as $protected |
            (range(0; $old_ones | length)) as $i |
            $old_ones[$i] as $curr |
            (if $i > 0 then $old_ones[$i-1] else $protected[-1] end) as $next |
            
            ((($next.created | fromdateiso8601) - ($curr.created | fromdateiso8601)) / 86400) as $days |
            
            if $days < 7 then
              "[УДАЛЕНИЕ] Релиз \($curr.tag) (прожил \($days | Stout) дн. до след. релиза)"
            else
              "[СОХРАНИТЬ] Релиз \($curr.tag) (прожил \($days | Stout) дн. — стабильный)"
            end
          '

      - name: Summary - Final State
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "--------------------------------------------------------"
          echo "### ТАК БУДЕТ ВЫГЛЯДЕТЬ СПИСОК РЕЛИЗОВ ПОСЛЕ ОЧИСТКИ: ###"
          
          gh api --paginate repos/${{ github.repository }}/releases \
            --jq '
              .[0:10] as $top | 
              .[10:] as $rest |
              [
                $top[].tag_name,
                (
                  range(0; $rest | length) as $i |
                  $rest[$i] as $curr |
                  (if $i > 0 then $rest[$i-1] else $top[-1] end) as $next |
                  if ((($next.created | fromdateiso8601) - ($curr.created | fromdateiso8601)) / 86400) >= 7 
                  then $curr.tag_name else empty end
                )
              ] | .[]
            '